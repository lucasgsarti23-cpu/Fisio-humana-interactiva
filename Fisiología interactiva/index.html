<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fisiología Humana</title>

    <script type="module"
        src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js">
    </script>

    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f5f5f5;
            margin: 0;
            padding: 20px;
        }

        h1 {
            color: #b30000;
        }

        model-viewer {
            width: 800px;
            max-width: 100%;
            height: 600px;
            margin: 20px auto;
            background-color: white;
            border-radius: 10px;
        }
    </style>
</head>

<body>

    <h1>Fisiología Humana</h1>

    <h2>Modelo 3D del Corazón</h2>

    <model-viewer
      src="modelos/corazonhum.glb"
        alt="Corazón humano 3D"
        auto-rotate
        camera-controls
        shadow-intensity="1">
    </model-viewer>

</body>

</html>
