<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Laboratorio Cardiovascular Interactivo</title>

<script type="module"
src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js">
</script>

<style>

body{
font-family: Arial;
margin:0;
background:#f4f7fa;
}

header{
background:#0d3b66;
color:white;
text-align:center;
padding:20px;
}

main{
max-width:1000px;
margin:auto;
padding:20px;
}

/* CARD GENERAL */
.card{
background:white;
padding:20px;
margin:15px 0;
border-radius:10px;
box-shadow:0 0 8px rgba(0,0,0,0.1);
}

/* 🧪 LABORATORIO */
.laboratorio{
display:flex;
gap:20px;
flex-wrap:wrap;
align-items:center;
}

/* 🫀 MODELO */
model-viewer{
width:480px;
height:420px;
transition: transform 0.2s ease;
}

/* 📈 ECG (FIJO Y SEPARADO) */
.ecg-container{
width:100%;
margin-top:15px;
}

.ecg{
width:100%;
height:140px;
background:black;
border-radius:10px;
overflow:hidden;
position:relative;
}

.ecg svg{
width:200%;
height:100%;
animation:moveECG 1s linear infinite;
}

@keyframes moveECG{
from{transform:translateX(0);}
to{transform:translateX(-50%);}
}

/* SIMULADOR */
.simulador{
background:#eef5fb;
padding:15px;
border-radius:10px;
}

input[type="range"]{
width:100%;
}

button{
padding:10px;
margin-top:10px;
cursor:pointer;
}

.resultado{
font-weight:bold;
margin-top:10px;
}

.estado{
margin-top:10px;
font-weight:bold;
}

</style>
</head>

<body>

<header>
<h1>Laboratorio Cardiovascular Interactivo</h1>
</header>

<main>

<!-- 🫀 MODELO -->
<div class="card">

<h2>Corazón 3D + ECG sincronizado</h2>

<div class="laboratorio">

<model-viewer
id="corazon"
src="modelos/corazonhum.glb"
auto-rotate
camera-controls>
</model-viewer>

</div>

<!-- 📈 ECG BIEN SEPARADO -->
<div class="ecg-container">

<div class="ecg">

<svg viewBox="0 0 500 120" preserveAspectRatio="none">

<polyline
stroke="lime"
stroke-width="2"
fill="none"
points="
0,60 20,60 40,60 60,60 80,60
90,30 100,90 110,20 120,60
140,60 160,60 180,60 200,60
220,60 240,60 260,60 280,60
300,60 310,30 320,90 330,20 340,60
360,60 380,60 400,60 420,60
440,60 460,60 480,60 500,60
"
/>

</svg>

</div>

</div>

</div>

<!-- 🧪 SIMULACIÓN -->
<div class="card">

<h3>Simulación fisiológica</h3>

<div class="simulador">

<label>Frecuencia Cardíaca: <span id="fcVal">70</span></label>
<input type="range" id="fc" min="40" max="200" value="70" oninput="actualizar()">

<label>Volumen Sistólico: <span id="vsVal">70</span></label>
<input type="range" id="vs" min="30" max="150" value="70" oninput="actualizar()">

<div class="resultado">
Gasto Cardíaco: <span id="gc">4.9</span> L/min
</div>

<div id="estado"></div>

<button onclick="reset()">🔄 Reset</button>

</div>

</div>

</main>

<script>

let latido;

function actualizar(){

let fc = Number(document.getElementById("fc").value);
let vs = Number(document.getElementById("vs").value);

document.getElementById("fcVal").innerText = fc;
document.getElementById("vsVal").innerText = vs;

let gc = (fc * vs) / 1000;
document.getElementById("gc").innerText = gc.toFixed(1);

// estado
let estado = "";
if(fc < 80) estado = "🟢 Reposo";
else if(fc < 140) estado = "🟡 Ejercicio moderado";
else estado = "🔴 Alta intensidad";

document.getElementById("estado").innerText = estado;

// 🫀 latido
let modelo = document.getElementById("corazon");

let intensidad = 1 + (vs / 300);
let velocidad = 60000 / fc;

clearInterval(latido);

latido = setInterval(() => {

modelo.style.transform = `scale(${intensidad})`;

setTimeout(() => {
modelo.style.transform = "scale(1)";
}, velocidad/2);

}, velocidad);

// 📈 ECG sincronizado
document.querySelector(".ecg svg").style.animationDuration =
(60000 / fc) + "ms";

}

function reset(){

document.getElementById("fc").value = 70;
document.getElementById("vs").value = 70;

actualizar();

}

actualizar();

</script>

</body>
</html>
