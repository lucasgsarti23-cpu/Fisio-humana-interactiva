<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Laboratorio Cardiovascular</title>

<script type="module"
src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js">
</script>

<style>

body{
font-family: Arial;
background:#f4f7fa;
margin:0;
}

header{
background:#0d3b66;
color:white;
padding:20px;
text-align:center;
}

main{
max-width:1000px;
margin:auto;
padding:20px;
}

.card{
background:white;
padding:20px;
margin:15px 0;
border-radius:10px;
box-shadow:0 0 8px rgba(0,0,0,0.1);
}

.simulador{
background:#eef5fb;
padding:15px;
border-radius:10px;
margin-top:10px;
}

input[type="range"]{
width:100%;
}

button{
padding:10px;
margin-top:10px;
cursor:pointer;
}

.resultado{
font-weight:bold;
margin-top:10px;
}

/* 🔥 CONTENEDOR CORAZÓN + ECG */
.laboratorio{
display:flex;
gap:20px;
flex-wrap:wrap;
align-items:center;
}

/* MODELO 3D */
model-viewer{
width:500px;
height:450px;
transition: transform 0.2s ease;
}

/* ECG */
.ecg{
flex:1;
min-width:250px;
background:black;
height:120px;
position:relative;
overflow:hidden;
border-radius:10px;
}

.linea{
position:absolute;
width:200%;
height:2px;
background:lime;
top:60px;
animation:ecgMove 1s linear infinite;
}

@keyframes ecgMove{
from{ transform:translateX(0); }
to{ transform:translateX(-50%); }
}

/* pico QRS */
.pico{
position:absolute;
width:2px;
height:60px;
background:lime;
top:30px;
left:50%;
animation:pulse 1s infinite;
}

@keyframes pulse{
0%,90%{opacity:0;}
95%{opacity:1; height:80px;}
100%{opacity:0;}
}

.estado{
margin-top:10px;
font-weight:bold;
}

</style>
</head>

<body>

<header>
<h1>Laboratorio Cardiovascular Interactivo</h1>
</header>

<main>

<div class="card">

<h2>Corazón 3D + ECG en tiempo real</h2>

<div class="laboratorio">

<!-- 🫀 CORAZÓN -->
<model-viewer
id="corazon"
src="modelos/corazonhum.glb"
auto-rotate
camera-controls>
</model-viewer>

<!-- 📈 ECG -->
<div class="ecg">

<div class="linea"></div>
<div class="pico" id="picoQRS"></div>

</div>

</div>

</div>

<div class="card">

<h3>Simulación fisiológica</h3>

<div class="simulador">

<label>Frecuencia Cardíaca: <span id="fcVal">70</span></label>
<input type="range" id="fc" min="40" max="200" value="70" oninput="actualizar()">

<label>Volumen Sistólico: <span id="vsVal">70</span></label>
<input type="range" id="vs" min="30" max="150" value="70" oninput="actualizar()">

<div class="resultado">
Gasto Cardíaco: <span id="gc">4.9</span> L/min
</div>

<div id="estado"></div>

<button onclick="reset()">🔄 Reset</button>

</div>

</div>

</main>

<script>

let latido;

function actualizar(){

let fc = Number(document.getElementById("fc").value);
let vs = Number(document.getElementById("vs").value);

document.getElementById("fcVal").innerText = fc;
document.getElementById("vsVal").innerText = vs;

let gc = (fc * vs) / 1000;
document.getElementById("gc").innerText = gc.toFixed(1);

let estado = "";
let modelo = document.getElementById("corazon");

let intensidad = 1 + (vs / 300);
let velocidad = 60000 / fc;

// estado fisiológico
if(fc < 80){
estado = "🟢 Reposo";
}
else if(fc < 140){
estado = "🟡 Ejercicio moderado";
}
else{
estado = "🔴 Alta intensidad";
}

document.getElementById("estado").innerText = estado;

// latido visual
clearInterval(latido);

latido = setInterval(() => {

modelo.style.transform = `scale(${intensidad})`;

setTimeout(() => {
modelo.style.transform = "scale(1)";
}, velocidad/2);

}, velocidad);

// ECG sincronizado con FC
let pico = document.getElementById("picoQRS");

pico.style.animationDuration = (60000/fc) + "ms";

}

function reset(){

document.getElementById("fc").value = 70;
document.getElementById("vs").value = 70;

actualizar();

}

actualizar();

</script>

</body>
</html>
