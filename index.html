<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fisiología Humana Interactiva</title>

<!-- MODELO 3D -->
<script type="module"
src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js">
</script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family: Arial, sans-serif;
    background:#f4f7fa;
}

header{
    background:#0d3b66;
    color:white;
    text-align:center;
    padding:30px;
}

nav{
    background:#145da0;
    padding:15px;
    display:flex;
    justify-content:center;
    gap:15px;
    flex-wrap:wrap;
}

nav button{
    padding:10px 15px;
    border:none;
    border-radius:5px;
    background:white;
    cursor:pointer;
    font-weight:bold;
}

nav button:hover{
    background:#dbe9f4;
}

main{
    max-width:1200px;
    margin:auto;
    padding:30px;
}

.modulo{
    display:none;
}

.modulo.activo{
    display:block;
}

.card{
    background:white;
    padding:20px;
    margin:15px 0;
    border-radius:10px;
    box-shadow:0 0 8px rgba(0,0,0,0.1);
}

.simulador{
    margin-top:20px;
    padding:20px;
    background:#eef5fb;
    border-radius:10px;
}

input[type="range"]{
    width:100%;
}

button{
    padding:10px;
    margin:5px;
    cursor:pointer;
}

.resultado{
    margin-top:15px;
    font-size:18px;
    font-weight:bold;
}

model-viewer{
    width:100%;
    height:450px;
    border-radius:10px;
}

footer{
    text-align:center;
    padding:20px;
    background:#0d3b66;
    color:white;
    margin-top:40px;
}

</style>
</head>

<body>

<header>
    <h1>Fisiología Humana Interactiva</h1>
    <p>Laboratorio virtual cardiovascular</p>
</header>

<nav>
    <button onclick="mostrarModulo('inicio')">Inicio</button>
    <button onclick="mostrarModulo('cardio')">Cardiovascular</button>
</nav>

<main>

<!-- INICIO -->
<section id="inicio" class="modulo activo">

<div class="card">
<h2>Bienvenido</h2>
<p>Explora la fisiología humana mediante simulación interactiva.</p>
</div>

</section>

<!-- CARDIO -->
<section id="cardio" class="modulo">

<div class="card">

<h2>Laboratorio Virtual Cardiovascular</h2>

<h3>Modelo 3D del corazón</h3>

<model-viewer
id="corazon3d"
src="modelos/corazonhum.glb"
auto-rotate
camera-controls
shadow-intensity="1">
</model-viewer>

</div>

<div class="card">

<h3>Simulación fisiológica</h3>

<div class="simulador">

<label>
Frecuencia Cardíaca: <span id="fcValor">70</span> lpm
</label>

<input type="range"
id="fc"
min="40"
max="200"
value="70"
oninput="actualizarLab()">

<label>
Volumen Sistólico: <span id="vsValor">70</span> ml
</label>

<input type="range"
id="vs"
min="30"
max="150"
value="70"
oninput="actualizarLab()">

<div class="resultado">
Gasto Cardíaco: <span id="gc">4.9</span> L/min
</div>

<div id="estado" style="margin-top:10px; font-weight:bold;"></div>

</div>

</div>

</section>

</main>

<footer>
Proyecto Fisiología Humana Interactiva
</footer>

<script>

// navegación
function mostrarModulo(id){

document.querySelectorAll(".modulo")
.forEach(m => m.classList.remove("activo"));

document.getElementById(id)
.classList.add("activo");
}

// simulación avanzada + 3D
function actualizarLab(){

let fc = Number(document.getElementById("fc").value);
let vs = Number(document.getElementById("vs").value);

document.getElementById("fcValor").innerText = fc;
document.getElementById("vsValor").innerText = vs;

let gc = (fc * vs) / 1000;
document.getElementById("gc").innerText = gc.toFixed(1);

// estado fisiológico
let estado = "";

if (fc < 80){
estado = "🟢 Reposo fisiológico";
document.getElementById("corazon3d").setAttribute("auto-rotate-speed", "1");
}

else if (fc < 140){
estado = "🟡 Ejercicio moderado";
document.getElementById("corazon3d").setAttribute("auto-rotate-speed", "3");
}

else{
estado = "🔴 Alta intensidad";
document.getElementById("corazon3d").setAttribute("auto-rotate-speed", "6");
}

document.getElementById("estado").innerText = estado;
}

</script>

</body>
</html>
